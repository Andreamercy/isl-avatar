<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISL Avatar – Motion Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e14; color: #e8e8f0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #canvas-container { position: fixed; inset: 0; }

  #panel {
    position: fixed; top: 0; right: 0; width: 300px; height: 100vh;
    background: rgba(10,10,20,0.85); backdrop-filter: blur(14px);
    border-left: 1px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column; padding: 20px; gap: 14px;
    z-index: 10; overflow-y: auto;
  }
  h1 { font-size: 15px; font-weight: 700; letter-spacing: .06em; color: #a78bfa; text-transform: uppercase; }
  label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing:.05em; }

  .file-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    background: rgba(167,139,250,0.12); border: 1px dashed rgba(167,139,250,0.35);
    cursor: pointer; font-size: 12px; color: #c4b5fd; transition: background .2s;
  }
  .file-btn:hover { background: rgba(167,139,250,0.22); }
  .file-btn input { display: none; }
  .file-btn .icon { font-size: 18px; }

  #status {
    font-size: 11px; padding: 8px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.05); color: #aaa; min-height: 34px; line-height: 1.5;
  }
  #status.ok   { color: #6ee7b7; background: rgba(110,231,183,0.08); }
  #status.err  { color: #fca5a5; background: rgba(252,165,165,0.08); }
  #status.info { color: #93c5fd; background: rgba(147,197,253,0.08); }

  .controls { display: flex; gap: 8px; }
  button {
    flex: 1; padding: 9px 6px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  button:disabled { opacity: .35; cursor: default; }
  #btn-play  { background: #7c3aed; color: #fff; }
  #btn-pause { background: #374151; color: #d1d5db; }
  #btn-reset { background: #1f2937; color: #9ca3af; }
  button:not(:disabled):hover { opacity: .82; }

  .scrubber-wrap { display: flex; flex-direction: column; gap: 6px; }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 4px;
    border-radius: 2px; background: #374151; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #7c3aed; cursor: pointer;
  }
  .time-row { display: flex; justify-content: space-between; font-size: 10px; color: #6b7280; }

  .speed-row { display: flex; gap: 5px; }
  .speed-btn { flex: 1; padding: 5px 2px; font-size: 11px; border-radius: 5px; background: #1f2937; color: #9ca3af; }
  .speed-btn.active { background: #7c3aed; color: #fff; }

  .stats { font-size: 10px; color: #4b5563; line-height: 1.8; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
  .stats span { color: #9ca3af; }

  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle-row label { font-size: 12px; color: #9ca3af; text-transform: none; letter-spacing: 0; }
  input[type=checkbox] { accent-color: #7c3aed; width: 14px; height: 14px; cursor: pointer; }

  #overlay {
    position: fixed; inset: 0; background: #0e0e14;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
  }
  #overlay h2 { font-size: 22px; color: #a78bfa; }
  #overlay p  { font-size: 13px; color: #666; }
  .spinner {
    width: 44px; height: 44px; border: 3px solid rgba(167,139,250,0.2);
    border-top-color: #7c3aed; border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <h2>ISL Avatar</h2>
  <p>Loading Three.js…</p>
</div>

<div id="canvas-container"></div>

<div id="panel">
  <h1>🤟 ISL Avatar</h1>

  <div>
    <label>Avatar (.glb)</label>
    <label class="file-btn" style="margin-top:6px">
      <span class="icon">🧍</span>
      <span id="glb-name">Drop or click to load GLB</span>
      <input type="file" id="glb-input" accept=".glb,.gltf" />
    </label>
  </div>

  <div>
    <label>Motion JSON</label>
    <label class="file-btn" style="margin-top:6px">
      <span class="icon">📂</span>
      <span id="json-name">Drop or click to load JSON</span>
      <input type="file" id="json-input" accept=".json" />
    </label>
  </div>

  <div id="status">Load a GLB avatar and a motion JSON to begin.</div>

  <div>
    <label>Playback</label>
    <div class="controls" style="margin-top:6px">
      <button id="btn-play"  disabled>▶ Play</button>
      <button id="btn-pause" disabled>⏸</button>
      <button id="btn-reset" disabled>⏮</button>
    </div>
  </div>

  <div class="scrubber-wrap">
    <input type="range" id="scrubber" min="0" max="100" value="0" disabled />
    <div class="time-row">
      <span id="time-cur">0.0s</span>
      <span id="time-tot">0.0s</span>
    </div>
  </div>

  <div>
    <label>Speed</label>
    <div class="speed-row" style="margin-top:6px">
      <button class="speed-btn" data-speed="0.5">0.5×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="1.5">1.5×</button>
      <button class="speed-btn" data-speed="2">2×</button>
    </div>
  </div>

  <div class="toggle-row">
    <input type="checkbox" id="toggle-skeleton" />
    <label for="toggle-skeleton">Show skeleton overlay</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-loop" checked />
    <label for="toggle-loop">Loop animation</label>
  </div>

  <div class="stats" id="stats">
    Frames: <span id="stat-frames">—</span><br>
    FPS: <span id="stat-fps">—</span><br>
    Duration: <span id="stat-dur">—</span><br>
    Landmarks/frame: <span id="stat-lm">—</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─────────────────────────────────────────────────────────────────────────────
// Pose landmark indices
// ─────────────────────────────────────────────────────────────────────────────
const POSE_IDX = {
  NOSE: 0,
  LEFT_SHOULDER:  11, RIGHT_SHOULDER: 12,
  LEFT_ELBOW:     13, RIGHT_ELBOW:    14,
  LEFT_WRIST:     15, RIGHT_WRIST:    16,
  LEFT_HIP:       23, RIGHT_HIP:      24,
};

// ─────────────────────────────────────────────────────────────────────────────
// Finger definitions
// Each finger: landmark index for [MCP, PIP, DIP, TIP]
// Bone name suffixes for [MCP-bone, PIP-bone, DIP-bone, TIP-bone]
// ─────────────────────────────────────────────────────────────────────────────
const FINGERS = {
  Thumb:  { lm: [1,  2,  3,  4],  bones: ['Thumb1', 'Thumb2', 'Thumb3', 'Thumb4']  },
  Index:  { lm: [5,  6,  7,  8],  bones: ['Index1', 'Index2', 'Index3', 'Index4']  },
  Middle: { lm: [9,  10, 11, 12], bones: ['Middle1','Middle2','Middle3','Middle4'] },
  Ring:   { lm: [13, 14, 15, 16], bones: ['Ring1',  'Ring2',  'Ring3',  'Ring4']   },
  Pinky:  { lm: [17, 18, 19, 20], bones: ['Pinky1', 'Pinky2', 'Pinky3', 'Pinky4'] },
};

// Lerp factors
const LERP_ARM  = 0.5;
const LERP_HAND = 0.6;
const CROSSFADE_FRAMES = 6;

// ─────────────────────────────────────────────────────────────────────────────
// Scene
// ─────────────────────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace    = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e14);
scene.fog        = new THREE.Fog(0x0e0e14, 8, 20);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 100);
camera.position.set(0, 1.4, 2.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance   = 0.5;
controls.maxDistance   = 8;
controls.update();

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(2, 4, 3); keyLight.castShadow = true;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xa78bfa, 0.4);
fillLight.position.set(-3, 2, -2); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0x60a5fa, 0.3);
rimLight.position.set(0, 3, -4); scene.add(rimLight);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.95 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);
scene.add(new THREE.GridHelper(10, 20, 0x222233, 0x1a1a28));

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let avatar         = null;
let boneMap        = {};
let restRotMap     = {};   // rest Euler per bone (bind pose)
let motionData     = null;
let skeletonHelper = null;

let playing        = false;
let frameIdx       = 0;
let speed          = 1.0;
let looping        = true;
let lastTime       = 0;
let frameTimer     = 0;
let scrubbing      = false;
let crossfadeAlpha = 1.0;

// ─────────────────────────────────────────────────────────────────────────────
// GLB loading
// ─────────────────────────────────────────────────────────────────────────────
function loadGLB(url, name) {
  setStatus('Loading avatar…', 'info');
  if (avatar)         { scene.remove(avatar); boneMap = {}; restRotMap = {}; }
  if (skeletonHelper) { scene.remove(skeletonHelper); skeletonHelper = null; }

  new GLTFLoader().load(url, gltf => {
    avatar = gltf.scene;
    avatar.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow = obj.receiveShadow = true;
        if (obj.material) { obj.material.metalness = 0; obj.material.roughness = 0.7; }
      }
      if (obj.isBone || obj.type === 'Bone') boneMap[obj.name] = obj;
    });
    avatar.traverse(obj => {
      if (obj.isSkinnedMesh && obj.skeleton)
        obj.skeleton.bones.forEach(b => { boneMap[b.name] = b; });
    });

    // Capture the rest/bind Euler for every bone so we can
    // apply finger rotations as deltas on top of the rest pose.
    for (const [bName, bone] of Object.entries(boneMap)) {
      restRotMap[bName] = bone.rotation.clone();
    }

    scene.add(avatar);
    const box = new THREE.Box3().setFromObject(avatar);
    avatar.position.y = -box.min.y;

    document.getElementById('glb-name').textContent = name;
    setStatus(`✅ Avatar loaded — ${Object.keys(boneMap).length} bones`, 'ok');
    console.log('Bones found:', Object.keys(boneMap).sort().join(', '));
    tryEnablePlay();
  }, undefined, err => {
    setStatus(`❌ Failed to load GLB: ${err.message}`, 'err');
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// JSON loading
// ─────────────────────────────────────────────────────────────────────────────
function readJSONFile(file) {
  if (!file.name.toLowerCase().endsWith('.json'))
    return Promise.reject(`Expected a .json file, got "${file.name}"`);
  setStatus(`Reading ${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB)…`, 'info');
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      let data;
      try { data = JSON.parse(ev.target.result); }
      catch (e) { reject(`JSON syntax error: ${e.message}`); return; }
      if (!data.frames || !Array.isArray(data.frames)) { reject('Missing "frames" array'); return; }
      if (data.frames.length === 0)                     { reject('"frames" is empty'); return; }
      if (typeof data.fps !== 'number' || data.fps <= 0){ reject('"fps" must be a positive number'); return; }
      if (typeof data.total_frames !== 'number')        { reject('"total_frames" missing'); return; }
      resolve(data);
    };
    reader.onerror = () => reject('File read error');
    reader.readAsText(file);
  });
}

function loadMotionJSON(data, name) {
  motionData = data; frameIdx = 0; frameTimer = 0; crossfadeAlpha = 1.0;
  document.getElementById('json-name').textContent = name;
  const dur = data.total_frames / data.fps;
  const lmCount = (data.frames[0]?.pose?.length || 0)
                + (data.frames[0]?.left_hand?.length || 0)
                + (data.frames[0]?.right_hand?.length || 0);
  document.getElementById('stat-frames').textContent = data.total_frames;
  document.getElementById('stat-fps').textContent    = data.fps.toFixed(1);
  document.getElementById('stat-dur').textContent    = dur.toFixed(2) + 's';
  document.getElementById('stat-lm').textContent     = lmCount;
  document.getElementById('scrubber').max            = data.total_frames - 1;
  document.getElementById('scrubber').value          = 0;
  document.getElementById('time-tot').textContent    = dur.toFixed(1) + 's';
  const wordLabel = data.word ?? name.replace(/\.json$/i, '').toUpperCase();
  setStatus(`✅ Motion loaded — "${wordLabel}"  ${data.total_frames} frames @ ${data.fps.toFixed(0)} fps`, 'ok');
  tryEnablePlay();
}

// ─────────────────────────────────────────────────────────────────────────────
// Frame application
// ─────────────────────────────────────────────────────────────────────────────
function applyFrame(idx, alpha) {
  if (!avatar || !motionData) return;
  const frameA = motionData.frames[idx];
  if (!frameA) return;
  if (alpha !== undefined && alpha < 1.0 && looping) {
    const frameB = motionData.frames[0];
    applyPose(lerpLandmarks(frameA.pose,      frameB.pose,      alpha));
    applyHand(lerpLandmarks(frameA.left_hand, frameB.left_hand, alpha), 'Left');
    applyHand(lerpLandmarks(frameA.right_hand,frameB.right_hand,alpha), 'Right');
  } else {
    applyPose(frameA.pose);
    applyHand(frameA.left_hand,  'Left');
    applyHand(frameA.right_hand, 'Right');
  }
}

function lerpLandmarks(a, b, t) {
  if (!a || !b) return a || b;
  return a.map((lA, i) => {
    const lB = b[i]; if (!lB) return lA;
    return { x: lA.x*t+lB.x*(1-t), y: lA.y*t+lB.y*(1-t), z: (lA.z||0)*t+(lB.z||0)*(1-t) };
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// POSE — arms, spine, head
// ─────────────────────────────────────────────────────────────────────────────
function applyPose(pose) {
  if (!pose || pose.length < 25) return;
  const lS=pose[11],rS=pose[12],lE=pose[13],rE=pose[14],lW=pose[15],rW=pose[16];
  const lH=pose[23],rH=pose[24],nose=pose[0];

  if (lS&&lE) smoothBone('LeftArm',      computeLimbEuler(lS,lE,-1), LERP_ARM);
  if (lE&&lW) smoothBone('LeftForeArm',  computeLimbEuler(lE,lW,-1), LERP_ARM);
  if (rS&&rE) smoothBone('RightArm',     computeLimbEuler(rS,rE, 1), LERP_ARM);
  if (rE&&rW) smoothBone('RightForeArm', computeLimbEuler(rE,rW, 1), LERP_ARM);

  if (lS&&rS&&lH&&rH) {
    const sm={x:(lS.x+rS.x)/2,y:(lS.y+rS.y)/2}, hm={x:(lH.x+rH.x)/2,y:(lH.y+rH.y)/2};
    const tx=THREE.MathUtils.clamp((sm.y-hm.y)*0.8,-0.3,0.3);
    const ty=THREE.MathUtils.clamp((sm.x-hm.x)*0.8,-0.3,0.3);
    smoothBone('Spine',  new THREE.Euler(tx*0.3,ty*0.3,0));
    smoothBone('Spine1', new THREE.Euler(tx*0.4,ty*0.4,0));
    smoothBone('Spine2', new THREE.Euler(tx*0.3,ty*0.3,0));
  }
  if (nose&&lS&&rS&&boneMap['Head']) {
    const nx=(lS.x+rS.x)/2, ny=(lS.y+rS.y)/2;
    const hx=THREE.MathUtils.clamp(-(nose.y-ny)*1.2*Math.PI,-0.4,0.4);
    const hy=THREE.MathUtils.clamp( (nose.x-nx)*1.5*Math.PI,-0.5,0.5);
    boneMap['Head'].rotation.set(hx,hy,0);
    if (boneMap['Neck']) boneMap['Neck'].rotation.set(hx*0.4,hy*0.3,0);
  }
}

function computeLimbEuler(from, to, side) {
  const dir = new THREE.Vector3((to.x-from.x)*side,-(to.y-from.y),(to.z||0)-(from.z||0)).normalize();
  const def = new THREE.Vector3(side,-1,0).normalize();
  return new THREE.Euler().setFromQuaternion(new THREE.Quaternion().setFromUnitVectors(def,dir),'XYZ');
}

// ─────────────────────────────────────────────────────────────────────────────
// HAND retargeting — angle-based curl + splay
//
// Approach (same as Kalidokit / Mediapipe-to-VRM):
//
//  1. Build a palm coordinate frame (wrist origin, fingers-forward = +Y,
//     thumb-side = +X for right hand / -X for left hand, dorsal = +Z).
//
//  2. For EACH finger joint, compute the BEND ANGLE between the two adjacent
//     bone segments using the dot product.  That angle maps directly to a
//     local X-rotation (curl) on the bone.
//
//  3. For the MCP bone only, compute the SPLAY angle (deviation of the finger
//     from the palm center-line in the palm plane) and apply it as a local
//     Z-rotation (abduction/adduction).
//
//  4. The thumb gets special treatment because it opposes rather than curls
//     like the other fingers.
//
// Why angles, not quaternion direction-matching?
//   Finger bones in RPM/Mixamo rigs have a well-defined local-space convention:
//     • Curl  = rotation around local X axis
//     • Splay = rotation around local Z axis
//   Applying angles directly in bone-local space is robust regardless of which
//   global axis the bone happens to be pointing, and avoids all the frame-
//   construction complexity that was failing before.
// ─────────────────────────────────────────────────────────────────────────────
function applyHand(landmarks, side) {
  if (!landmarks || landmarks.length < 21) return;

  const isLeft = side === 'Left';
  const prefix = side;
  // sx mirrors MediaPipe X back to anatomical space:
  // MediaPipe video mode: screen-right is +X for BOTH hands (raw frame coords).
  // Person's LEFT hand is on their left → screen-left → needs sx=-1 to flip.
  const sx = isLeft ? -1 : 1;

  // Convert a MediaPipe landmark to a consistent right-handed world vector
  // (Y-up, X-right from the subject's perspective)
  const v = (idx) => {
    const l = landmarks[idx];
    if (!l) return null;
    if (l.x === 0 && l.y === 0 && (!l.z || l.z === 0)) return null;
    return new THREE.Vector3(l.x * sx, -l.y, l.z || 0);
  };

  // Wrist and key knuckles
  const W  = v(0);
  const I5 = v(5);   // index MCP
  const M9 = v(9);   // middle MCP
  const R13= v(13);  // ring MCP
  const P17= v(17);  // pinky MCP
  if (!W || !I5 || !M9) return;

  // ── Palm coordinate frame ────────────────────────────────────────────────
  // palmY: wrist → middle knuckle (finger direction)
  const palmY = M9.clone().sub(W).normalize();

  // palmX: across knuckles (index → pinky direction, = splay axis)
  const palmX = P17
    ? P17.clone().sub(I5).normalize()
    : new THREE.Vector3(sx > 0 ? -1 : 1, 0, 0);

  // palmZ: dorsal normal (back of hand)
  const palmZ = new THREE.Vector3().crossVectors(palmX, palmY).normalize();

  // Re-orthogonalise palmX
  palmX.crossVectors(palmY, palmZ).normalize();

  // ── Wrist bone: match palm orientation to arm ─────────────────────────────
  // palmY points along fingers, palmX is lateral, palmZ is dorsal.
  // Build a quaternion that takes the model from its rest wrist orientation
  // to the observed palm orientation.
  const palmMat  = new THREE.Matrix4().makeBasis(palmX, palmY, palmZ);
  const palmQuat = new THREE.Quaternion().setFromRotationMatrix(palmMat);

  const wristBone = boneMap[prefix + 'Hand'];
  if (wristBone) {
    const pWorldQ = new THREE.Quaternion();
    if (wristBone.parent) wristBone.parent.getWorldQuaternion(pWorldQ);
    const targetLocal = palmQuat.clone().premultiply(pWorldQ.clone().invert());
    wristBone.quaternion.slerp(targetLocal, LERP_HAND);
  }

  // ── Finger bones: angle-based curl + splay ───────────────────────────────
  for (const [fingerName, finger] of Object.entries(FINGERS)) {
    const lmIdx = finger.lm;   // [MCP, PIP, DIP, TIP] landmark indices
    const bones = finger.bones; // [MCP-bone, PIP-bone, DIP-bone, TIP-bone] suffixes

    // Gather landmark positions (in world space)
    const pts = lmIdx.map(i => v(i));
    if (!pts[0] || !pts[1]) continue;

    // ── Splay (MCP bone only) ────────────────────────────────────────────
    // Measure how far the knuckle deviates left/right from the palm center-line.
    // palmY is the center-line; project (wrist→MCP) onto the palm plane and
    // measure its angle from palmY around palmZ.
    const mcpDir = pts[0].clone().sub(W).normalize();
    // Splay angle = angle in the palmX direction
    const splayAngle = Math.asin(
      THREE.MathUtils.clamp(mcpDir.dot(palmX), -1, 1)
    );
    // For the thumb, splay differently (thumb abducts in Z)
    const mcpBoneName = prefix + 'Hand' + bones[0];
    const mcpBone = boneMap[mcpBoneName];
    if (mcpBone) {
      const rest = restRotMap[mcpBoneName] || new THREE.Euler();
      if (fingerName === 'Thumb') {
        // Thumb MCP: use splay as Y rotation (opposition)
        mcpBone.rotation.set(
          lerp1(mcpBone.rotation.x, rest.x, LERP_HAND),
          lerp1(mcpBone.rotation.y, rest.y + splayAngle * 0.6, LERP_HAND),
          lerp1(mcpBone.rotation.z, rest.z, LERP_HAND)
        );
      } else {
        // Other fingers: splay as Z (abduction)
        // Curl angle from wrist→MCP vs palmY
        const curl0 = angleBetween(palmY, mcpDir);
        mcpBone.rotation.set(
          lerp1(mcpBone.rotation.x, rest.x + curl0 * 0.4, LERP_HAND),
          lerp1(mcpBone.rotation.y, rest.y, LERP_HAND),
          lerp1(mcpBone.rotation.z, rest.z - splayAngle, LERP_HAND)
        );
      }
    }

    // ── Curl (PIP, DIP bones — indices 1 and 2 in bones[]) ──────────────
    // For each intermediate joint, measure the bend angle between the incoming
    // and outgoing segment vectors, then apply as local X rotation.
    for (let j = 0; j < 2; j++) {
      if (!pts[j] || !pts[j+1] || !pts[j+2]) continue;
      const boneName = prefix + 'Hand' + bones[j + 1];
      const bone     = boneMap[boneName];
      if (!bone) continue;

      // Incoming segment: pts[j] → pts[j+1]
      const segIn  = pts[j+1].clone().sub(pts[j]).normalize();
      // Outgoing segment: pts[j+1] → pts[j+2]
      const segOut = pts[j+2].clone().sub(pts[j+1]).normalize();

      // Bend angle (always ≥ 0; fingers only curl, they don't hyper-extend
      // significantly, so we clamp to [0, π*0.9])
      let curlAngle = angleBetween(segIn, segOut);
      curlAngle = THREE.MathUtils.clamp(curlAngle, 0, Math.PI * 0.85);

      // For the thumb the curl axis is slightly different — use as-is
      const rest = restRotMap[boneName] || new THREE.Euler();
      if (fingerName === 'Thumb') {
        bone.rotation.set(
          lerp1(bone.rotation.x, rest.x + curlAngle * 0.7, LERP_HAND),
          lerp1(bone.rotation.y, rest.y, LERP_HAND),
          lerp1(bone.rotation.z, rest.z, LERP_HAND)
        );
      } else {
        bone.rotation.set(
          lerp1(bone.rotation.x, rest.x + curlAngle, LERP_HAND),
          lerp1(bone.rotation.y, rest.y, LERP_HAND),
          lerp1(bone.rotation.z, rest.z, LERP_HAND)
        );
      }
    }

    // ── TIP bone (index 3) — copy DIP curl, no splay ────────────────────
    if (pts[2] && pts[3]) {
      const tipBoneName = prefix + 'Hand' + bones[3];
      const tipBone = boneMap[tipBoneName];
      if (tipBone) {
        const segIn  = pts[3].clone().sub(pts[2]).normalize();
        const segRef = pts[2].clone().sub(pts[1] || pts[2]).normalize();
        let curlAngle = pts[1] ? angleBetween(segRef, segIn) : 0;
        curlAngle = THREE.MathUtils.clamp(curlAngle, 0, Math.PI * 0.7);
        const rest = restRotMap[tipBoneName] || new THREE.Euler();
        tipBone.rotation.set(
          lerp1(tipBone.rotation.x, rest.x + curlAngle * (fingerName === 'Thumb' ? 0.5 : 0.8), LERP_HAND),
          lerp1(tipBone.rotation.y, rest.y, LERP_HAND),
          lerp1(tipBone.rotation.z, rest.z, LERP_HAND)
        );
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Math helpers
// ─────────────────────────────────────────────────────────────────────────────

/** Angle between two unit vectors (safe, returns 0–π) */
function angleBetween(a, b) {
  return Math.acos(THREE.MathUtils.clamp(a.dot(b), -1, 1));
}

/** Simple lerp for a scalar value */
function lerp1(current, target, t) {
  return current + (target - current) * t;
}

// ─────────────────────────────────────────────────────────────────────────────
// Bone helpers
// ─────────────────────────────────────────────────────────────────────────────
function smoothBone(boneName, euler, t = LERP_ARM) {
  const bone = boneMap[boneName];
  if (!bone) return;
  bone.rotation.x = lerp1(bone.rotation.x, euler.x, t);
  bone.rotation.y = lerp1(bone.rotation.y, euler.y, t);
  bone.rotation.z = lerp1(bone.rotation.z, euler.z, t);
}

// ─────────────────────────────────────────────────────────────────────────────
// Render loop
// ─────────────────────────────────────────────────────────────────────────────
function animate(ts) {
  requestAnimationFrame(animate);
  controls.update();

  if (playing && motionData && !scrubbing) {
    const dt = ts - lastTime;
    frameTimer += dt * speed;
    const frameDur = 1000 / motionData.fps;

    while (frameTimer >= frameDur) {
      frameTimer -= frameDur;
      frameIdx++;
      if (frameIdx >= motionData.total_frames) {
        if (looping) { frameIdx = 0; crossfadeAlpha = 0.0; }
        else {
          frameIdx = motionData.total_frames - 1;
          playing  = false;
          document.getElementById('btn-play').disabled  = false;
          document.getElementById('btn-pause').disabled = true;
        }
      }
    }
    if (crossfadeAlpha < 1.0) crossfadeAlpha = Math.min(1.0, crossfadeAlpha + 1.0/CROSSFADE_FRAMES);
    applyFrame(frameIdx, crossfadeAlpha);
    updateScrubber();
  }
  lastTime = ts;
  renderer.render(scene, camera);
}

function updateScrubber() {
  if (!motionData) return;
  document.getElementById('scrubber').value       = frameIdx;
  document.getElementById('time-cur').textContent = (frameIdx / motionData.fps).toFixed(1) + 's';
}

// ─────────────────────────────────────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = cls;
}
function tryEnablePlay() {
  if (avatar && motionData) {
    document.getElementById('btn-play').disabled  = false;
    document.getElementById('btn-reset').disabled = false;
    document.getElementById('scrubber').disabled  = false;
    applyFrame(0, 1.0);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// File inputs & drag-drop
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('glb-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (f) loadGLB(URL.createObjectURL(f), f.name);
});
document.getElementById('json-input').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  try { loadMotionJSON(await readJSONFile(f), f.name); }
  catch(err) { setStatus('❌ ' + err, 'err'); console.error(err); }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault();
  for (const f of e.dataTransfer.files) {
    const n = f.name.toLowerCase();
    if (n.endsWith('.glb') || n.endsWith('.gltf')) {
      loadGLB(URL.createObjectURL(f), f.name);
    } else if (n.endsWith('.json')) {
      try { loadMotionJSON(await readJSONFile(f), f.name); }
      catch(err) { setStatus('❌ ' + err, 'err'); }
    } else {
      setStatus(`❌ Unsupported: "${f.name}". Drop a .glb or .json.`, 'err');
    }
  }
});

// Playback buttons
document.getElementById('btn-play').addEventListener('click', () => {
  playing = true;
  document.getElementById('btn-play').disabled  = true;
  document.getElementById('btn-pause').disabled = false;
});
document.getElementById('btn-pause').addEventListener('click', () => {
  playing = false;
  document.getElementById('btn-play').disabled  = false;
  document.getElementById('btn-pause').disabled = true;
});
document.getElementById('btn-reset').addEventListener('click', () => {
  frameIdx = 0; frameTimer = 0; crossfadeAlpha = 1.0; playing = false;
  document.getElementById('btn-play').disabled  = false;
  document.getElementById('btn-pause').disabled = true;
  applyFrame(0, 1.0); updateScrubber();
});

// Scrubber
const scrubEl = document.getElementById('scrubber');
scrubEl.addEventListener('mousedown',  () => { scrubbing = true; });
scrubEl.addEventListener('touchstart', () => { scrubbing = true; }, { passive: true });
scrubEl.addEventListener('mouseup',    () => { scrubbing = false; });
scrubEl.addEventListener('touchend',   () => { scrubbing = false; });
scrubEl.addEventListener('input', () => {
  frameIdx = parseInt(scrubEl.value); crossfadeAlpha = 1.0;
  applyFrame(frameIdx, 1.0); updateScrubber();
});

// Speed buttons
document.querySelectorAll('.speed-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  })
);

// Skeleton toggle
document.getElementById('toggle-skeleton').addEventListener('change', e => {
  if (e.target.checked && avatar) {
    skeletonHelper = new THREE.SkeletonHelper(avatar);
    skeletonHelper.material.linewidth = 2;
    scene.add(skeletonHelper);
  } else if (skeletonHelper) {
    scene.remove(skeletonHelper); skeletonHelper = null;
  }
});

// Loop toggle
document.getElementById('toggle-loop').addEventListener('change', e => { looping = e.target.checked; });

// Start
document.getElementById('overlay').style.display = 'none';
requestAnimationFrame(animate);
</script>
</body>
</html>
