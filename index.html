<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISL Avatar – Motion Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e14; color: #e8e8f0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #canvas-container { position: fixed; inset: 0; }

  #panel {
    position: fixed; top: 0; right: 0; width: 300px; height: 100vh;
    background: rgba(10,10,20,0.85); backdrop-filter: blur(14px);
    border-left: 1px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column; padding: 20px; gap: 14px;
    z-index: 10; overflow-y: auto;
  }
  h1 { font-size: 15px; font-weight: 700; letter-spacing: .06em; color: #a78bfa; text-transform: uppercase; }
  label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing:.05em; }

  .file-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    background: rgba(167,139,250,0.12); border: 1px dashed rgba(167,139,250,0.35);
    cursor: pointer; font-size: 12px; color: #c4b5fd; transition: background .2s;
  }
  .file-btn:hover { background: rgba(167,139,250,0.22); }
  .file-btn input { display: none; }
  .file-btn .icon { font-size: 18px; }

  #status {
    font-size: 11px; padding: 8px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.05); color: #aaa; min-height: 34px; line-height: 1.5;
  }
  #status.ok   { color: #6ee7b7; background: rgba(110,231,183,0.08); }
  #status.err  { color: #fca5a5; background: rgba(252,165,165,0.08); }
  #status.info { color: #93c5fd; background: rgba(147,197,253,0.08); }

  .controls { display: flex; gap: 8px; }
  button {
    flex: 1; padding: 9px 6px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  button:disabled { opacity: .35; cursor: default; }
  #btn-play  { background: #7c3aed; color: #fff; }
  #btn-pause { background: #374151; color: #d1d5db; }
  #btn-reset { background: #1f2937; color: #9ca3af; }
  button:not(:disabled):hover { opacity: .82; }

  .scrubber-wrap { display: flex; flex-direction: column; gap: 6px; }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 4px;
    border-radius: 2px; background: #374151; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #7c3aed; cursor: pointer;
  }
  .time-row { display: flex; justify-content: space-between; font-size: 10px; color: #6b7280; }

  .speed-row { display: flex; gap: 5px; }
  .speed-btn { flex: 1; padding: 5px 2px; font-size: 11px; border-radius: 5px; background: #1f2937; color: #9ca3af; }
  .speed-btn.active { background: #7c3aed; color: #fff; }

  .stats { font-size: 10px; color: #4b5563; line-height: 1.8; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
  .stats span { color: #9ca3af; }

  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle-row label { font-size: 12px; color: #9ca3af; text-transform: none; letter-spacing: 0; }
  input[type=checkbox] { accent-color: #7c3aed; width: 14px; height: 14px; cursor: pointer; }

  #overlay {
    position: fixed; inset: 0; background: #0e0e14;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
  }
  #overlay h2 { font-size: 22px; color: #a78bfa; }
  #overlay p  { font-size: 13px; color: #666; }
  .spinner {
    width: 44px; height: 44px; border: 3px solid rgba(167,139,250,0.2);
    border-top-color: #7c3aed; border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <h2>ISL Avatar</h2>
  <p>Loading Three.js…</p>
</div>

<div id="canvas-container"></div>

<div id="panel">
  <h1>🤟 ISL Avatar</h1>

  <div>
    <label>Avatar (.glb)</label>
    <label class="file-btn" style="margin-top:6px">
      <span class="icon">🧍</span>
      <span id="glb-name">Drop or click to load GLB</span>
      <input type="file" id="glb-input" accept=".glb,.gltf" />
    </label>
  </div>

  <div>
    <label>Motion JSON</label>
    <label class="file-btn" style="margin-top:6px">
      <span class="icon">📂</span>
      <span id="json-name">Drop or click to load JSON</span>
      <input type="file" id="json-input" accept=".json" />
    </label>
  </div>

  <div id="status">Load a GLB avatar and a motion JSON to begin.</div>

  <div>
    <label>Playback</label>
    <div class="controls" style="margin-top:6px">
      <button id="btn-play"  disabled>▶ Play</button>
      <button id="btn-pause" disabled>⏸</button>
      <button id="btn-reset" disabled>⏮</button>
    </div>
  </div>

  <div class="scrubber-wrap">
    <input type="range" id="scrubber" min="0" max="100" value="0" disabled />
    <div class="time-row">
      <span id="time-cur">0.0s</span>
      <span id="time-tot">0.0s</span>
    </div>
  </div>

  <div>
    <label>Speed</label>
    <div class="speed-row" style="margin-top:6px">
      <button class="speed-btn" data-speed="0.5">0.5×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="1.5">1.5×</button>
      <button class="speed-btn" data-speed="2">2×</button>
    </div>
  </div>

  <div class="toggle-row">
    <input type="checkbox" id="toggle-skeleton" />
    <label for="toggle-skeleton">Show skeleton overlay</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-loop" checked />
    <label for="toggle-loop">Loop animation</label>
  </div>

  <div class="stats" id="stats">
    Frames: <span id="stat-frames">—</span><br>
    FPS: <span id="stat-fps">—</span><br>
    Duration: <span id="stat-dur">—</span><br>
    Landmarks/frame: <span id="stat-lm">—</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─────────────────────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────────────────────
const POSE_IDX = {
  NOSE: 0,
  LEFT_SHOULDER: 11, RIGHT_SHOULDER: 12,
  LEFT_ELBOW:    13, RIGHT_ELBOW:    14,
  LEFT_WRIST:    15, RIGHT_WRIST:    16,
  LEFT_HIP:      23, RIGHT_HIP:      24,
};

// Finger chain: MCP index → [pip, dip, tip] bone names, per side
// Each entry maps: landmark_index → bone_name
const HAND_FINGER_CHAINS = {
  Thumb:  { mcp: 1, joints: [2, 3, 4],  bones: ['Thumb2','Thumb3','Thumb4']  },
  Index:  { mcp: 5, joints: [6, 7, 8],  bones: ['Index2','Index3','Index4']  },
  Middle: { mcp: 9, joints: [10,11,12], bones: ['Middle2','Middle3','Middle4']},
  Ring:   { mcp:13, joints: [14,15,16], bones: ['Ring2','Ring3','Ring4']      },
  Pinky:  { mcp:17, joints: [18,19,20], bones: ['Pinky2','Pinky3','Pinky4']  },
};

// MCP bones (knuckles) — rotate to spread/curl the whole finger
const MCP_BONES = {
  Thumb:  'Thumb1',
  Index:  'Index1',
  Middle: 'Middle1',
  Ring:   'Ring1',
  Pinky:  'Pinky1',
};

const LERP_ARM  = 0.5;   // arm smoothing (slightly slower for natural feel)
const LERP_HAND = 0.65;  // hand smoothing
const CROSSFADE_FRAMES = 6;

// ─────────────────────────────────────────────────────────────────────────────
// Scene setup
// ─────────────────────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace    = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e14);
scene.fog        = new THREE.Fog(0x0e0e14, 8, 20);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 100);
camera.position.set(0, 1.4, 2.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance   = 0.5;
controls.maxDistance   = 8;
controls.update();

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(2, 4, 3); keyLight.castShadow = true;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xa78bfa, 0.4);
fillLight.position.set(-3, 2, -2); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0x60a5fa, 0.3);
rimLight.position.set(0, 3, -4); scene.add(rimLight);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.95 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);
scene.add(new THREE.GridHelper(10, 20, 0x222233, 0x1a1a28));

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let avatar         = null;
let boneMap        = {};
let restQuatMap    = {};   // stores bone rest quaternions for local-space retargeting
let motionData     = null;
let skeletonHelper = null;

let playing        = false;
let frameIdx       = 0;
let speed          = 1.0;
let looping        = true;
let lastTime       = 0;
let frameTimer     = 0;
let scrubbing      = false;
let crossfadeAlpha = 1.0;

// ─────────────────────────────────────────────────────────────────────────────
// GLB loading — capture rest pose quaternions after load
// ─────────────────────────────────────────────────────────────────────────────
function loadGLB(url, name) {
  setStatus('Loading avatar…', 'info');
  if (avatar)         { scene.remove(avatar); boneMap = {}; restQuatMap = {}; }
  if (skeletonHelper) { scene.remove(skeletonHelper); skeletonHelper = null; }

  new GLTFLoader().load(url, gltf => {
    avatar = gltf.scene;
    avatar.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow = obj.receiveShadow = true;
        if (obj.material) { obj.material.metalness = 0; obj.material.roughness = 0.7; }
      }
      if (obj.isBone || obj.type === 'Bone') boneMap[obj.name] = obj;
    });
    avatar.traverse(obj => {
      if (obj.isSkinnedMesh && obj.skeleton)
        obj.skeleton.bones.forEach(b => { boneMap[b.name] = b; });
    });

    // Store the rest-pose quaternion for every bone.
    // We'll use these as the baseline so finger rotations are computed
    // relative to the bone's natural resting orientation.
    for (const [name, bone] of Object.entries(boneMap)) {
      restQuatMap[name] = bone.quaternion.clone();
    }

    scene.add(avatar);
    const box = new THREE.Box3().setFromObject(avatar);
    avatar.position.y = -box.min.y;

    document.getElementById('glb-name').textContent = name;
    setStatus(`✅ Avatar loaded — ${Object.keys(boneMap).length} bones`, 'ok');
    console.log('Bones:', Object.keys(boneMap).sort());
    tryEnablePlay();
  }, undefined, err => {
    setStatus(`❌ Failed to load GLB: ${err.message}`, 'err');
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// JSON loading & validation
// ─────────────────────────────────────────────────────────────────────────────
function readJSONFile(file) {
  if (!file.name.toLowerCase().endsWith('.json'))
    return Promise.reject(`Expected a .json file, got "${file.name}"`);

  setStatus(`Reading ${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB)…`, 'info');

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      let data;
      try { data = JSON.parse(ev.target.result); }
      catch (err) { reject(`JSON syntax error: ${err.message}`); return; }

      if (!data.frames || !Array.isArray(data.frames))
        { reject('Invalid file: missing "frames" array. Was this generated by extract_motion.py?'); return; }
      if (data.frames.length === 0)
        { reject('Invalid file: "frames" array is empty.'); return; }
      if (typeof data.fps !== 'number' || data.fps <= 0)
        { reject('Invalid file: "fps" must be a positive number.'); return; }
      if (typeof data.total_frames !== 'number' || data.total_frames <= 0)
        { reject('Invalid file: "total_frames" must be a positive number.'); return; }

      resolve(data);
    };
    reader.onerror = () => reject('File read error — the file may be corrupted.');
    reader.readAsText(file);
  });
}

function loadMotionJSON(data, name) {
  motionData     = data;
  frameIdx       = 0;
  frameTimer     = 0;
  crossfadeAlpha = 1.0;

  document.getElementById('json-name').textContent = name;

  const dur     = data.total_frames / data.fps;
  const lmCount = (data.frames[0]?.pose?.length      || 0)
                + (data.frames[0]?.left_hand?.length  || 0)
                + (data.frames[0]?.right_hand?.length || 0);

  document.getElementById('stat-frames').textContent = data.total_frames;
  document.getElementById('stat-fps').textContent    = data.fps.toFixed(1);
  document.getElementById('stat-dur').textContent    = dur.toFixed(2) + 's';
  document.getElementById('stat-lm').textContent     = lmCount;
  document.getElementById('scrubber').max            = data.total_frames - 1;
  document.getElementById('scrubber').value          = 0;
  document.getElementById('time-tot').textContent    = dur.toFixed(1) + 's';

  const wordLabel = data.word ?? name.replace(/\.json$/i, '').toUpperCase();
  setStatus(`✅ Motion loaded — "${wordLabel}"  ${data.total_frames} frames @ ${data.fps.toFixed(0)} fps`, 'ok');
  tryEnablePlay();
}

// ─────────────────────────────────────────────────────────────────────────────
// applyFrame — dispatch with optional crossfade blend
// ─────────────────────────────────────────────────────────────────────────────
function applyFrame(idx, alpha) {
  if (!avatar || !motionData) return;
  const frameA = motionData.frames[idx];
  if (!frameA) return;

  if (alpha !== undefined && alpha < 1.0 && looping) {
    const frameB = motionData.frames[0];
    applyPose(lerpLandmarks(frameA.pose,       frameB.pose,       alpha));
    applyHand(lerpLandmarks(frameA.left_hand,  frameB.left_hand,  alpha), 'Left');
    applyHand(lerpLandmarks(frameA.right_hand, frameB.right_hand, alpha), 'Right');
  } else {
    applyPose(frameA.pose);
    applyHand(frameA.left_hand,  'Left');
    applyHand(frameA.right_hand, 'Right');
  }
}

function lerpLandmarks(a, b, t) {
  if (!a || !b) return a || b;
  return a.map((lmA, i) => {
    const lmB = b[i];
    if (!lmB) return lmA;
    return {
      x: lmA.x * t + lmB.x * (1 - t),
      y: lmA.y * t + lmB.y * (1 - t),
      z: (lmA.z || 0) * t + (lmB.z || 0) * (1 - t),
    };
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// POSE — arm, spine, head
// ─────────────────────────────────────────────────────────────────────────────
function applyPose(pose) {
  if (!pose || pose.length < 25) return;

  const lS   = pose[POSE_IDX.LEFT_SHOULDER];
  const rS   = pose[POSE_IDX.RIGHT_SHOULDER];
  const lE   = pose[POSE_IDX.LEFT_ELBOW];
  const rE   = pose[POSE_IDX.RIGHT_ELBOW];
  const lW   = pose[POSE_IDX.LEFT_WRIST];
  const rW   = pose[POSE_IDX.RIGHT_WRIST];
  const lH   = pose[POSE_IDX.LEFT_HIP];
  const rH   = pose[POSE_IDX.RIGHT_HIP];
  const nose = pose[POSE_IDX.NOSE];

  if (lS && lE) smoothBone('LeftArm',     computeLimbEuler(lS, lE, -1), LERP_ARM);
  if (lE && lW) smoothBone('LeftForeArm', computeLimbEuler(lE, lW, -1), LERP_ARM);
  if (rS && rE) smoothBone('RightArm',    computeLimbEuler(rS, rE,  1), LERP_ARM);
  if (rE && rW) smoothBone('RightForeArm',computeLimbEuler(rE, rW,  1), LERP_ARM);

  if (lS && rS && lH && rH) {
    const t = computeSpineTilt(lS, rS, lH, rH);
    smoothBone('Spine',  new THREE.Euler(t.x * 0.3, t.y * 0.3, 0));
    smoothBone('Spine1', new THREE.Euler(t.x * 0.4, t.y * 0.4, 0));
    smoothBone('Spine2', new THREE.Euler(t.x * 0.3, t.y * 0.3, 0));
  }

  if (nose && lS && rS && boneMap['Head']) {
    const nx = (lS.x + rS.x) / 2, ny = (lS.y + rS.y) / 2;
    const headRot = new THREE.Euler(
      THREE.MathUtils.clamp(-(nose.y - ny) * 1.2 * Math.PI, -0.4, 0.4),
      THREE.MathUtils.clamp( (nose.x - nx) * 1.5 * Math.PI, -0.5, 0.5),
      0, 'XYZ'
    );
    boneMap['Head'].rotation.copy(headRot);
    if (boneMap['Neck']) boneMap['Neck'].rotation.set(headRot.x * 0.4, headRot.y * 0.3, 0);
  }
}

function computeLimbEuler(from, to, side) {
  const dir = new THREE.Vector3(
    (to.x - from.x) * side,
    -(to.y - from.y),
    (to.z || 0) - (from.z || 0)
  ).normalize();
  const def = new THREE.Vector3(side, -1, 0).normalize();
  return new THREE.Euler().setFromQuaternion(
    new THREE.Quaternion().setFromUnitVectors(def, dir), 'XYZ'
  );
}

function computeSpineTilt(lS, rS, lH, rH) {
  const sm = { x: (lS.x + rS.x) / 2, y: (lS.y + rS.y) / 2 };
  const hm = { x: (lH.x + rH.x) / 2, y: (lH.y + rH.y) / 2 };
  return new THREE.Euler(
    THREE.MathUtils.clamp((sm.y - hm.y) * 0.8, -0.3, 0.3),
    THREE.MathUtils.clamp((sm.x - hm.x) * 0.8, -0.3, 0.3),
    0, 'XYZ'
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// HAND retargeting — complete rewrite
//
// Key insight: MediaPipe gives us 3D landmark positions in *camera space*.
// GLB bones live in *local bone space* where:
//   - fingers point roughly along +X (for right hand) or -X (for left hand)
//   - palm faces roughly along -Z (forward)
//
// Strategy:
//   1. Build a palm coordinate frame from the wrist + knuckle landmarks.
//   2. Express each finger-segment direction in that palm frame.
//   3. Map the palm-frame direction onto the bone's local rest axes.
//   4. This correctly translates curl/splay/twist into bone rotations
//      regardless of how the arm is oriented in world space.
// ─────────────────────────────────────────────────────────────────────────────
function applyHand(landmarks, side) {
  if (!landmarks || landmarks.length < 21) return;

  const isLeft = side === 'Left';
  const prefix = side;         // 'Left' or 'Right'
  const sx     = isLeft ? -1 : 1;  // MediaPipe X mirror sign

  // ── Step 1: Build palm coordinate frame from landmarks ──────────────────
  // wrist = landmark 0
  // knuckle row = landmarks 5 (index MCP), 9 (middle MCP), 13 (ring MCP), 17 (pinky MCP)
  const w  = lm(landmarks, 0);
  const i5 = lm(landmarks, 5);
  const m9 = lm(landmarks, 9);
  const p17= lm(landmarks, 17);

  if (!w || !i5 || !m9) return;

  // Palm forward axis: wrist → middle knuckle
  const palmFwd = new THREE.Vector3(
    (m9.x - w.x) * sx,
    -(m9.y - w.y),
    (m9.z || 0) - (w.z || 0)
  );
  if (palmFwd.lengthSq() < 1e-6) return;
  palmFwd.normalize();

  // Palm right axis: index knuckle → pinky knuckle (across palm)
  const palmRight = p17 ? new THREE.Vector3(
    (p17.x - i5.x) * sx,
    -(p17.y - i5.y),
    (p17.z || 0) - (i5.z || 0)
  ).normalize() : new THREE.Vector3(sx, 0, 0);

  // Palm up axis: cross product (ensures orthogonality)
  const palmUp = new THREE.Vector3().crossVectors(palmFwd, palmRight).normalize();
  // Re-orthogonalise right
  palmRight.crossVectors(palmUp, palmFwd).normalize();

  // Palm rotation matrix: columns are palmRight, palmUp, palmFwd
  const palmMat = new THREE.Matrix4().makeBasis(palmRight, palmUp, palmFwd);
  const palmQuat = new THREE.Quaternion().setFromRotationMatrix(palmMat);

  // ── Step 2: Apply wrist bone rotation ──────────────────────────────────
  // The wrist bone (LeftHand / RightHand) should rotate to match palmQuat.
  // We want the bone's local rotation = inv(parentWorldQuat) * palmQuat,
  // but since arms already handle the gross world orientation, we apply
  // a delta from the bone's rest pose.
  const wristBoneName = prefix + 'Hand';
  const wristBone     = boneMap[wristBoneName];
  if (wristBone) {
    // Get parent's current world quaternion so we work in local space
    const parentWorldQuat = new THREE.Quaternion();
    if (wristBone.parent) wristBone.parent.getWorldQuaternion(parentWorldQuat);

    // Target local quat: what the bone needs to be in its parent's space
    const targetLocalQuat = palmQuat.clone()
      .premultiply(parentWorldQuat.clone().invert());

    // Slerp toward target
    wristBone.quaternion.slerp(targetLocalQuat, LERP_HAND);
  }

  // ── Step 3: Apply finger bone rotations ────────────────────────────────
  // For each finger segment we:
  //   a) Get the segment direction in camera space
  //   b) Express it in palm space (removing gross hand orientation)
  //   c) Map to bone-local rotation using the bone's rest quaternion
  const palmQuatInv = palmQuat.clone().invert();

  for (const [fingerName, chain] of Object.entries(HAND_FINGER_CHAINS)) {
    const mcpBoneName = prefix + 'Hand' + MCP_BONES[fingerName];
    const mcpLmIdx    = chain.mcp;

    // MCP bone — direction from wrist to this knuckle, expressed in palm space
    const mcpLm = lm(landmarks, mcpLmIdx);
    if (mcpLm && w) {
      const segDir = new THREE.Vector3(
        (mcpLm.x - w.x) * sx,
        -(mcpLm.y - w.y),
        (mcpLm.z || 0) - (w.z || 0)
      ).normalize();
      applyFingerBoneRotation(mcpBoneName, segDir, palmQuatInv, LERP_HAND);
    }

    // PIP / DIP / TIP bones — direction from parent landmark to child
    for (let j = 0; j < chain.joints.length; j++) {
      const boneName  = prefix + 'Hand' + chain.bones[j];
      const childIdx  = chain.joints[j];
      const parentIdx = j === 0 ? mcpLmIdx : chain.joints[j - 1];

      const childLm  = lm(landmarks, childIdx);
      const parentLm = lm(landmarks, parentIdx);
      if (!childLm || !parentLm) continue;

      const segDir = new THREE.Vector3(
        (childLm.x - parentLm.x) * sx,
        -(childLm.y - parentLm.y),
        (childLm.z || 0) - (parentLm.z || 0)
      ).normalize();

      applyFingerBoneRotation(boneName, segDir, palmQuatInv, LERP_HAND);
    }
  }
}

/**
 * Rotate a finger bone so it points along `segDirWorld`.
 *
 * We transform segDirWorld into the palm's local frame (removing the gross
 * hand rotation), then into the bone's local rest frame, then compute the
 * minimal rotation from the bone's rest forward axis to that direction.
 *
 * @param {string}              boneName     GLB bone name
 * @param {THREE.Vector3}       segDirWorld  segment direction in camera/world space
 * @param {THREE.Quaternion}    palmQuatInv  inverse of palm coordinate frame quaternion
 * @param {number}              lerpT        smoothing factor
 */
function applyFingerBoneRotation(boneName, segDirWorld, palmQuatInv, lerpT) {
  const bone = boneMap[boneName];
  if (!bone) return;

  // Direction in palm-local space
  const dirInPalm = segDirWorld.clone().applyQuaternion(palmQuatInv);

  // The bone's rest-pose forward direction in its own local space is +X
  // (for most humanoid rigs using the Ready Player Me / Mixamo convention).
  // We rotate from +X to dirInPalm.
  const restFwd = new THREE.Vector3(1, 0, 0);
  if (dirInPalm.lengthSq() < 1e-6) return;
  dirInPalm.normalize();

  // Avoid degenerate rotation (vectors nearly anti-parallel)
  const dot = restFwd.dot(dirInPalm);
  if (dot < -0.9999) {
    // 180° flip — rotate around Z
    bone.quaternion.slerp(
      new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), Math.PI),
      lerpT
    );
    return;
  }

  const targetQuat = new THREE.Quaternion().setFromUnitVectors(restFwd, dirInPalm);

  // Apply relative to rest quaternion so we don't fight the bind pose
  const restQuat = restQuatMap[boneName] || new THREE.Quaternion();
  const finalQuat = restQuat.clone().multiply(targetQuat);

  bone.quaternion.slerp(finalQuat, lerpT);
}

// Helper: safely get a landmark (returns null if missing/degenerate)
function lm(landmarks, idx) {
  const l = landmarks[idx];
  if (!l) return null;
  // Reject landmarks where x,y,z are all exactly 0 (undetected)
  if (l.x === 0 && l.y === 0 && (!l.z || l.z === 0)) return null;
  return l;
}

// ─────────────────────────────────────────────────────────────────────────────
// Bone smoothing helpers
// ─────────────────────────────────────────────────────────────────────────────
function smoothBone(boneName, euler, t = LERP_ARM) {
  const bone = boneMap[boneName];
  if (!bone) return;
  bone.rotation.x = THREE.MathUtils.lerp(bone.rotation.x, euler.x, t);
  bone.rotation.y = THREE.MathUtils.lerp(bone.rotation.y, euler.y, t);
  bone.rotation.z = THREE.MathUtils.lerp(bone.rotation.z, euler.z, t);
}

// ─────────────────────────────────────────────────────────────────────────────
// Render / animation loop
// ─────────────────────────────────────────────────────────────────────────────
function animate(ts) {
  requestAnimationFrame(animate);
  controls.update();

  if (playing && motionData && !scrubbing) {
    const dt      = ts - lastTime;
    frameTimer   += dt * speed;
    const frameDur = 1000 / motionData.fps;

    while (frameTimer >= frameDur) {
      frameTimer -= frameDur;
      frameIdx++;
      if (frameIdx >= motionData.total_frames) {
        if (looping) {
          frameIdx = 0;
          crossfadeAlpha = 0.0;
        } else {
          frameIdx = motionData.total_frames - 1;
          playing  = false;
          document.getElementById('btn-play').disabled  = false;
          document.getElementById('btn-pause').disabled = true;
        }
      }
    }

    if (crossfadeAlpha < 1.0)
      crossfadeAlpha = Math.min(1.0, crossfadeAlpha + 1.0 / CROSSFADE_FRAMES);

    applyFrame(frameIdx, crossfadeAlpha);
    updateScrubber();
  }

  lastTime = ts;
  renderer.render(scene, camera);
}

function updateScrubber() {
  if (!motionData) return;
  document.getElementById('scrubber').value      = frameIdx;
  document.getElementById('time-cur').textContent = (frameIdx / motionData.fps).toFixed(1) + 's';
}

// ─────────────────────────────────────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className   = cls;
}

function tryEnablePlay() {
  if (avatar && motionData) {
    document.getElementById('btn-play').disabled  = false;
    document.getElementById('btn-reset').disabled = false;
    document.getElementById('scrubber').disabled  = false;
    applyFrame(0, 1.0);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// File inputs & drag-drop
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('glb-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadGLB(URL.createObjectURL(f), f.name);
});

document.getElementById('json-input').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  try { loadMotionJSON(await readJSONFile(f), f.name); }
  catch (err) { setStatus('❌ ' + err, 'err'); console.error(err); }
});

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault();
  for (const f of e.dataTransfer.files) {
    const n = f.name.toLowerCase();
    if (n.endsWith('.glb') || n.endsWith('.gltf')) {
      loadGLB(URL.createObjectURL(f), f.name);
    } else if (n.endsWith('.json')) {
      try { loadMotionJSON(await readJSONFile(f), f.name); }
      catch (err) { setStatus('❌ ' + err, 'err'); console.error(err); }
    } else {
      setStatus(`❌ Unsupported file: "${f.name}". Drop a .glb or .json.`, 'err');
    }
  }
});

// Playback controls
document.getElementById('btn-play').addEventListener('click', () => {
  playing = true;
  document.getElementById('btn-play').disabled  = true;
  document.getElementById('btn-pause').disabled = false;
});
document.getElementById('btn-pause').addEventListener('click', () => {
  playing = false;
  document.getElementById('btn-play').disabled  = false;
  document.getElementById('btn-pause').disabled = true;
});
document.getElementById('btn-reset').addEventListener('click', () => {
  frameIdx = 0; frameTimer = 0; crossfadeAlpha = 1.0; playing = false;
  document.getElementById('btn-play').disabled  = false;
  document.getElementById('btn-pause').disabled = true;
  applyFrame(0, 1.0); updateScrubber();
});

// Scrubber
const scrubEl = document.getElementById('scrubber');
scrubEl.addEventListener('mousedown',  () => { scrubbing = true; });
scrubEl.addEventListener('touchstart', () => { scrubbing = true; }, { passive: true });
scrubEl.addEventListener('mouseup',    () => { scrubbing = false; });
scrubEl.addEventListener('touchend',   () => { scrubbing = false; });
scrubEl.addEventListener('input', () => {
  frameIdx = parseInt(scrubEl.value); crossfadeAlpha = 1.0;
  applyFrame(frameIdx, 1.0); updateScrubber();
});

// Speed
document.querySelectorAll('.speed-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  })
);

// Skeleton toggle
document.getElementById('toggle-skeleton').addEventListener('change', e => {
  if (e.target.checked && avatar) {
    skeletonHelper = new THREE.SkeletonHelper(avatar);
    skeletonHelper.material.linewidth = 2;
    scene.add(skeletonHelper);
  } else if (skeletonHelper) {
    scene.remove(skeletonHelper); skeletonHelper = null;
  }
});

// Loop
document.getElementById('toggle-loop').addEventListener('change', e => { looping = e.target.checked; });

// Start
document.getElementById('overlay').style.display = 'none';
requestAnimationFrame(animate);
</script>
</body>
</html>
